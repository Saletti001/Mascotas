<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Laboratorio de Pruebas Genos V9.1</title>
    
    <script src="genoma.js"></script>
    <script src="caras.js"></script> 
    <script src="accesorios.js"></script> 
    <script src="SVGEngine.js"></script>
    <script src="app.js"></script>

    <style>
        body {
            background-color: #0a1118;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #4dd0e1; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(77, 208, 225, 0.5); margin-bottom: 5px; }
        
        .tabs-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .tab-btn { background: #1a2a36; color: #aaa; border: 1px solid #333; padding: 12px 25px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .tab-btn.active { background: rgba(77, 208, 225, 0.1); color: #4dd0e1; border-color: #4dd0e1; box-shadow: 0 0 15px rgba(77, 208, 225, 0.3); }

        .tab-content { display: none; width: 100%; max-width: 1200px; }
        .tab-content.active { display: flex; gap: 30px; align-items: stretch; }

        .lab-container { background: #1a2a36; padding: 25px; border-radius: 15px; border: 1px solid #4dd0e1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .controls { flex: 1; display: flex; flex-direction: column; gap: 15px; max-height: 700px; overflow-y: auto; padding-right: 15px; }
        .controls::-webkit-scrollbar { width: 6px; }
        .controls::-webkit-scrollbar-thumb { background: #4dd0e1; border-radius: 4px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 3px solid #4dd0e1; }
        .control-group.special-a { border-left: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.05); }
        .control-group.special-b { border-left: 3px solid #80deea; background: rgba(128, 222, 234, 0.05); }
        .control-group.special-c { border-left: 3px solid #8A2BE2; background: rgba(138, 43, 226, 0.05); }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        select, input[type="color"] { padding: 10px; background: #0d1a24; color: #fff; border: 1px solid #333; border-radius: 8px; font-size: 14px; outline: none; cursor: pointer; width: 100%; box-sizing: border-box; }
        select:focus, input:focus { border-color: #4dd0e1; }
        
        .viewer-container { flex: 1.5; display: flex; flex-direction: column; gap: 15px; }
        .viewer { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #31c4d8; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px); border-radius: 10px; border: 2px solid #4dd0e1; min-height: 400px; position: relative; overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,0.2); }
        
        .pedestal-container { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 0; }
        .pedestal-ring { width: 220px; height: 50px; border: 1px dashed rgba(255, 255, 255, 0.7); border-radius: 50%; position: absolute; top: -120px; }
        .pedestal-light { width: 130px; height: 140px; background: linear-gradient(to top, rgba(255, 255, 255, 0.5), transparent); position: absolute; top: -100px; }
        .pedestal-shadow { width: 170px; height: 45px; background: #111b24; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; position: absolute; top: 25px; }
        .pedestal-core { width: 50px; height: 4px; background: #80deea; border-radius: 4px; box-shadow: 0 0 10px #80deea, 0 0 20px #80deea; }
        #geno-display { width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; z-index: 1; position: relative; margin-bottom: 60px; }

        .terminal { background: #0d161c; border: 1px solid #1e3a5f; border-left: 4px solid #00ffcc; border-radius: 8px; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #00ffcc; height: 250px; overflow-y: auto; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); line-height: 1.6; }
        .terminal::-webkit-scrollbar { width: 4px; }
        .terminal::-webkit-scrollbar-thumb { background: #00ffcc; }
        .term-title { color: #fff; font-weight: bold; margin-bottom: 10px; text-align: center; border-bottom: 1px dashed #1e3a5f; padding-bottom: 5px; }

        /* PESTAÑA 2: COMBATE */
        .combat-arena { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .action-bar { display: flex; gap: 15px; align-items: center; }
        .btn-fight { flex: 1; background: linear-gradient(90deg, #8A2BE2, #4dd0e1); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-fight:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(138, 43, 226, 0.5); }
        .btn-action { flex: 1; background: linear-gradient(90deg, #ff5722, #d84315); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-action:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(255, 87, 34, 0.5); }
        .btn-action:disabled { background: #333; color: #888; cursor: not-allowed; box-shadow: none; filter: none; }

        .arena-screen { display: flex; justify-content: space-between; align-items: center; background-color: #31c4d8; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px); border-radius: 10px; border: 2px solid #4dd0e1; min-height: 350px; position: relative; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.4); padding: 20px; }
        
        .fighter-side { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; transition: 0.3s; }
        .fighter-svg { width: 200px; height: 200px; z-index: 1; margin-bottom: 10px; transition: 0.1s;}
        .fighter-svg.hit { filter: brightness(2) sepia(1) hue-rotate(-50deg) saturate(5); transform: scale(0.95); }
        
        .vs-badge { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: 900; font-style: italic; color: #ffcc00; text-shadow: 0 0 20px rgba(255,0,0,0.8); z-index: 2; }
        
        .fighter-stats { background: rgba(10, 17, 24, 0.85); border: 1px solid #4dd0e1; border-radius: 8px; padding: 15px; width: 85%; text-align: left; }
        .fighter-name { font-weight: 900; color: #fff; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; text-align: center; }
        
        .hp-bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: #4CAF50; width: 100%; transition: width 0.3s ease, background-color 0.3s ease; }
        .hp-text { text-align: center; font-size: 10px; font-weight: bold; margin-top: 2px; color: #fff; }
        .stats-row { display: flex; justify-content: space-around; color: #ff6b6b; font-size: 11px; font-weight: bold; margin-top: 8px; }

        .fighter-genes { font-size: 11px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #333; }
        .combo-badge { background: linear-gradient(90deg, #ff9800, #ff5722); color: white; text-align: center; padding: 5px; border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; margin-top: 10px; box-shadow: 0 0 10px rgba(255, 152, 0, 0.6); display: none; }
        
        .switch-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 8px; border: 1px solid #333; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ffcc00; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <h1>🔬 Laboratorio Genético V9.1</h1>
    
    <div class="tabs-container">
        <button id="btn-tab-adn" class="tab-btn active">🔬 ADN y Morfología</button>
        <button id="btn-tab-combat" class="tab-btn">⚔️ Simulación de Combate</button>
    </div>

    <div id="tab-adn" class="tab-content lab-container active">
        <div class="controls">
            <div class="switch-container">
                <span style="font-size: 12px; color: #fff; font-weight: bold;">ADN Escaneado (Revelar Genes)</span>
                <label class="switch"><input type="checkbox" id="chk-escaneado" checked><span class="slider"></span></label>
            </div>
            <div class="control-group">
                <label style="color:#ff6b6b">Rareza (Afecta Stats Base)</label>
                <select id="sel-rareza">
                    <option value="Común">Común</option><option value="Raro">Raro</option>
                    <option value="Épico">Épico</option><option value="Legendario">Legendario</option><option value="Mítico">Mítico</option>
                </select>
            </div>
            <div class="control-group"><label>Forma Base</label><select id="sel-forma"></select></div>
            <div class="control-group"><label>Color Base</label><input type="color" id="sel-color" value="#ff6b6b"></div>
            <div class="control-group"><label>Ojos</label><select id="sel-ojos"></select></div>
            <div class="control-group"><label>Boca</label><select id="sel-boca"></select></div>
            <div class="control-group"><label>Espalda / Alas</label><select id="sel-espalda"></select></div>
            <div class="control-group"><label>Accesorio / Cabeza</label><select id="sel-cabeza"></select></div>
            <div class="control-group special-a">
                <label style="color:#ffcc00">✨ Gen A (Cosmético)</label>
                <select id="sel-gen-a">
                    <option value="ninguno">Ninguno (Vacío)</option><option value="cromatico_latente">Cromático Latente (Épico)</option>
                    <option value="aura_linaje">Aura de Linaje (Legendario)</option><option value="patron_holografico">Patrón Holográfico (Mítico)</option>
                    <option value="brillo_bioluminiscente">Brillo Bioluminiscente (Raro)</option><option value="forma_invertida">Forma Invertida (Épico)</option>
                    <option value="rastro_elemental">Rastro Elemental (Raro)</option><option value="sombra_genetica">Sombra Genética (Épico)</option>
                    <option value="emblema_fundador">Emblema Fundador (Legendario)</option><option value="eco_visual">Eco Visual (Raro)</option>
                    <option value="metamorfosis_estacional">Metamorfosis Estacional (Épico)</option>
                </select>
            </div>
            <div class="control-group special-b"><label style="color:#80deea">⚙️ Gen B (Funcional 1)</label><select id="sel-gen-b"><option value="ninguno">Ninguno (Vacío)</option></select></div>
            <div class="control-group special-c"><label style="color:#8A2BE2">⚙️ Gen C (Funcional 2)</label><select id="sel-gen-c"><option value="ninguno">Ninguno (Vacío)</option></select></div>
        </div>

        <div class="viewer-container">
            <div class="viewer">
                <div class="pedestal-container"><div class="pedestal-ring"></div><div class="pedestal-light"></div><div class="pedestal-shadow"><div class="pedestal-core"></div></div></div>
                <div id="geno-display"></div>
            </div>
            <div id="terminal-output" class="terminal">
                <div class="term-title">/// TERMINAL DE DIAGNÓSTICO ESTRATÉGICO ///</div>
                <div id="terminal-content">Iniciando escáner...</div>
            </div>
        </div>
    </div>

    <div id="tab-combat" class="tab-content combat-arena lab-container">
        
        <div class="action-bar">
            <select id="sel-enemy-rareza" style="flex: 0.5; padding: 15px; background: #0d1a24; color: #ff6b6b; border: 1px solid #ff6b6b; border-radius: 8px; font-weight: bold; outline: none; cursor: pointer; text-transform: uppercase;">
                <option value="Común">Rival: Común</option>
                <option value="Raro">Rival: Raro</option>
                <option value="Épico">Rival: Épico</option>
                <option value="Legendario">Rival: Legendario</option>
                <option value="Mítico">Rival: Mítico</option>
            </select>
            <button id="btn-generar-combate" class="btn-fight">⚔️ Generar Aleatorio</button>
            <button id="btn-atacar" class="btn-action" disabled>🔥 Ejecutar Turno</button>
        </div>
        
        <div class="arena-screen">
            <div class="vs-badge">VS</div>
            
            <div class="fighter-side" id="side-player">
                <div id="combat-player-svg" class="fighter-svg"></div>
                <div class="fighter-stats">
                    <div class="fighter-name" style="color:#4dd0e1;">
                        TU GENO (<span id="c-p-rareza"></span>) <span id="c-p-calidad" style="font-size:12px; margin-left:5px;"></span>
                    </div>
                    <div class="hp-bar-bg"><div id="c-p-hp-fill" class="hp-bar-fill"></div></div>
                    <div id="c-p-hp-text" class="hp-text">HP: 0 / 0</div>
                    <div class="stats-row">
                        <span id="c-p-atk"></span> <span id="c-p-spd"></span> <span id="c-p-luk"></span>
                    </div>
                    <div class="fighter-genes">
                        <div style="color:#80deea">B: <span id="c-p-genb"></span></div>
                        <div style="color:#8A2BE2">C: <span id="c-p-genc"></span></div>
                    </div>
                    <div id="c-p-combo" class="combo-badge">🔥 COMBO: </div>
                </div>
            </div>

            <div class="fighter-side" id="side-enemy">
                <div id="combat-enemy-svg" class="fighter-svg"></div>
                <div class="fighter-stats">
                    <div class="fighter-name" style="color:#ff6b6b;">
                        RIVAL (<span id="c-e-rareza"></span>) <span id="c-e-calidad" style="font-size:12px; margin-left:5px;"></span>
                    </div>
                    <div class="hp-bar-bg"><div id="c-e-hp-fill" class="hp-bar-fill"></div></div>
                    <div id="c-e-hp-text" class="hp-text">HP: 0 / 0</div>
                    <div class="stats-row">
                        <span id="c-e-atk"></span> <span id="c-e-spd"></span> <span id="c-e-luk"></span>
                    </div>
                    <div class="fighter-genes">
                        <div style="color:#80deea">B: <span id="c-e-genb"></span></div>
                        <div style="color:#8A2BE2">C: <span id="c-e-genc"></span></div>
                    </div>
                    <div id="c-e-combo" class="combo-badge">🔥 COMBO: </div>
                </div>
            </div>
        </div>

        <div id="combat-log" class="terminal" style="height: 200px;">
            <div class="term-title">/// REGISTRO DE BATALLA ///</div>
            <div id="combat-log-content">> Esperando combatientes...</div>
        </div>
    </div>

    <script>
        // DICCIONARIO DE COMBOS V9.1
        const COMBOS_OFICIALES = [
            { ids: ["resiliencia_ultima", "aprendiz_acelerado"], nombre: "El Fénix" },
            { ids: ["piel_cristal", "reflejo_genetico"], nombre: "El Espejo Viviente" },
            { ids: ["resistencia_colapso", "catalizador_rareza"], nombre: "El Alquimista" },
            { ids: ["dominancia_genetica", "aprendiz_acelerado"], nombre: "El Criador Real" },
            { ids: ["barrera_limite", "vampirismo_genetico"], nombre: "El Inmortal" },
            { ids: ["armadura_adaptativa", "catalizador_afinidad"], nombre: "La Fortaleza Elemental" },
            { ids: ["velocidad_fantasma", "sangre_fria"], nombre: "El Fantasma Práctico" },
            { ids: ["cooldown_acelerado", "resonancia_nivel"], nombre: "El Acelerador Total" },
            { ids: ["gen_dominante_puro", "memoria_genetica"], nombre: "El Gran Linaje" },
            { ids: ["especialista_elite", "aceleracion_final"], nombre: "La Máquina Imparable" },
            { ids: ["alquimista_natural", "catalizador_critico"], nombre: "El Reactor Monstruoso" }
        ];

        function detectarComboSinergico(genB, genC) {
            if(!genB || !genC || genB === "ninguno" || genC === "ninguno") return null;
            const combo = COMBOS_OFICIALES.find(c => c.ids.includes(genB) && c.ids.includes(genC));
            return combo ? combo.nombre : null;
        }

        // FÓRMULA DE CALIDAD Y PUREZA DE IVs
        function obtenerCalidad(stats, rareza) {
            const limites = window.TABLA_IVS && window.TABLA_IVS[rareza] ? window.TABLA_IVS[rareza] : { hp: [35, 55], atk: [10, 22], spd: [8, 25], luk: [5, 15] };
            let tMin = limites.hp[0] + limites.atk[0] + limites.spd[0] + limites.luk[0];
            let tMax = limites.hp[1] + limites.atk[1] + limites.spd[1] + limites.luk[1];
            let tObt = stats.hp + stats.atk + stats.spd + stats.luk;
            
            let pct = Math.round(((tObt - tMin) / (tMax - tMin)) * 100);
            if (pct > 100) pct = 100; if (pct < 0) pct = 0;
            
            let rango = "D"; let color = "#d9534f";
            if (pct >= 95) { rango = "S"; color = "#ffcc00"; }
            else if (pct >= 80) { rango = "A"; color = "#4dd0e1"; }
            else if (pct >= 50) { rango = "B"; color = "#4CAF50"; }
            else if (pct >= 20) { rango = "C"; color = "#f0ad4e"; }
            
            return { rango, pct, color };
        }

        setTimeout(() => {
            const btnAdn = document.getElementById("btn-tab-adn");
            const btnCombat = document.getElementById("btn-tab-combat");
            const tabAdn = document.getElementById("tab-adn");
            const tabCombat = document.getElementById("tab-combat");

            btnAdn.onclick = () => { btnAdn.classList.add("active"); btnCombat.classList.remove("active"); tabAdn.classList.add("active"); tabCombat.classList.remove("active"); };
            btnCombat.onclick = () => { btnCombat.classList.add("active"); btnAdn.classList.remove("active"); tabCombat.classList.add("active"); tabAdn.classList.remove("active"); };

            const selRareza = document.getElementById("sel-rareza");
            const selForma = document.getElementById("sel-forma");
            const selColor = document.getElementById("sel-color");
            const selOjos = document.getElementById("sel-ojos");
            const selBoca = document.getElementById("sel-boca");
            const selEspalda = document.getElementById("sel-espalda");
            const selCabeza = document.getElementById("sel-cabeza");
            const selGenA = document.getElementById("sel-gen-a");
            const selGenB = document.getElementById("sel-gen-b");
            const selGenC = document.getElementById("sel-gen-c");
            const chkEscaneado = document.getElementById("chk-escaneado");
            
            const formasCuerpo = ["gota", "frijol", "circulo", "cuadrado", "triangulo", "hongo", "estrella", "pentagono", "nube", "chili", "rayo"];
            const opcionesOjos = typeof dicOjos !== 'undefined' ? Object.keys(dicOjos) : ["estandar", "cute", "angry"];
            const opcionesBocas = typeof dicBocas !== 'undefined' ? Object.keys(dicBocas) : ["estandar", "feliz", "colmillos"];
            const opcionesEspaldas = typeof dicAlas !== 'undefined' ? Object.keys(dicAlas) : ["ninguno"];
            const opcionesCabezas = typeof dicSombreros !== 'undefined' ? Object.keys(dicSombreros) : ["ninguno"];

            function rellenarSelect(selectElement, arrayData) {
                selectElement.innerHTML = "";
                arrayData.forEach(item => {
                    const option = document.createElement("option"); option.value = item;
                    option.innerText = item.charAt(0).toUpperCase() + item.slice(1).replace(/_/g, " ");
                    selectElement.appendChild(option);
                });
            }

            rellenarSelect(selForma, formasCuerpo); rellenarSelect(selOjos, opcionesOjos);
            rellenarSelect(selBoca, opcionesBocas); rellenarSelect(selEspalda, opcionesEspaldas);
            rellenarSelect(selCabeza, opcionesCabezas);
            selForma.value = formasCuerpo[Math.floor(Math.random() * formasCuerpo.length)];

            // Consolidar todos los genes para la Terminal
            let todosLosGenes = [];
            let genesFuncionales = [];
            if (window.BASE_DATOS_GENES_V9) {
                for (let cat in window.BASE_DATOS_GENES_V9) {
                    window.BASE_DATOS_GENES_V9[cat].forEach(g => {
                        g.categoria = cat;
                        todosLosGenes.push(g);
                        if (cat !== "cosmetico") genesFuncionales.push(g);
                    });
                }
            }

            const addGenesToSelect = (selectElement) => {
                selectElement.innerHTML = '<option value="ninguno">Ninguno (Vacío)</option>';
                genesFuncionales.forEach(g => {
                    let opt = document.createElement("option"); opt.value = g.id; opt.innerText = g.name; selectElement.appendChild(opt);
                });
            };
            addGenesToSelect(selGenB); addGenesToSelect(selGenC);

            function actualizarTerminal() {
                const term = document.getElementById("terminal-content");
                if (!chkEscaneado.checked) {
                    term.innerHTML = `<div style="color:#ff6b6b">> ERROR: ADN BLOQUEADO. Active el escáner (Toggle arriba) para revelar información genética.</div>`;
                    return;
                }

                let log = `<div style="color:#4dd0e1; margin-bottom: 10px;">> GENERANDO REPORTE DE ESTRATEGIA Y ADN...</div>`;
                
                const evaluarSlot = (id, nombreSlot, colorRGB) => {
                    if(id === "ninguno") return;
                    const gen = todosLosGenes.find(g => g.id === id);
                    if(gen) {
                        log += `<div style="color:${colorRGB}; margin-top:8px;">>>> ${nombreSlot}: [${gen.name.toUpperCase()}] <<<</div>`;
                        log += `&nbsp;&nbsp;<span style="color:#aaa">Efecto:</span> ${gen.desc}<br>`;
                        
                        let uso = "Proporciona ventajas estadísticas pasivas.";
                        if(gen.categoria === "cosmetico") uso = "Cosmético Visual. Aumenta drásticamente el valor del Geno para los coleccionistas en el mercado de $POL.";
                        else if(gen.id === "resiliencia_ultima") uso = "Ideal con builds de 'Glass Cannon'. Ponle Stats en ATK; cuando baje al 15% HP barrerá al rival.";
                        else if(gen.id === "piel_cristal") uso = "Excelente defensa contra Genos de un solo golpe fuerte. Útil en Torneos Supervivencia.";
                        else if(gen.id === "velocidad_fantasma") uso = "Construye este Geno con alta Velocidad (SPD) y ATK. Atacar dos veces rápido rompe bloqueos.";
                        else if(gen.id === "fertilidad_pura") uso = "No lo desperdicies criando con comunes. Úsalo como 'Padre Fundador' de tu linaje para tener 9 crías de élite.";
                        else if(gen.categoria === "crianza") uso = "Equípalo a tus mejores Genos y úsalos en la Incubadora para asegurar mejores crías.";
                        else if(gen.categoria === "progresion") uso = "Acelera su nivel. Te costará mucha menos Esencia Vital y manzanas llevarlo al Nivel 50.";
                        else if(gen.categoria === "reactor_santuario") uso = "Geno diseñado para quemar. Llévalo al Santuario o Reactor para maximizar tu ganancia de Esencia Vital.";
                        
                        log += `&nbsp;&nbsp;<span style="color:#4CAF50">Táctica recomendada:</span> ${uso}<br>`;
                    }
                };

                evaluarSlot(selGenA.value, "SLOT A (COSMÉTICO)", "#ffcc00");
                evaluarSlot(selGenB.value, "SLOT B (FUNCIONAL 1)", "#80deea");
                evaluarSlot(selGenC.value, "SLOT C (FUNCIONAL 2)", "#8A2BE2");
                
                if(selGenB.value !== "ninguno" && selGenB.value === selGenC.value) {
                    log += `<br><div style="color:#ff6b6b; font-weight:bold;">> ADVERTENCIA: Has colocado dos genes iguales. En el juego real, el Motor anula el Slot C por la regla (B != C).</div>`;
                }

                term.innerHTML = log;
            }

            function obtenerAdnPlayer() {
                const rareza = selRareza.value;
                const stats = window.generarStatsPorRareza ? window.generarStatsPorRareza(rareza) : {hp: 100, atk: 25, spd: 20, luk: 15};
                const genBData = selGenB.value !== "ninguno" ? genesFuncionales.find(g => g.id === selGenB.value) : null;
                const genCData = selGenC.value !== "ninguno" ? genesFuncionales.find(g => g.id === selGenC.value) : null;

                return {
                    id: 999, rarity: rareza, stats: stats,
                    body_shape: selForma.value, base_color: selColor.value, color: selColor.value,
                    eye_type: selOjos.value, mouth_type: selBoca.value, wing_type: selEspalda.value, hat_type: selCabeza.value,
                    scanned: chkEscaneado.checked,
                    hidden_genes: { A: selGenA.value !== "ninguno" ? { id: selGenA.value } : null, B: genBData, C: genCData }
                };
            }

            function renderizarGenoPlayer() {
                const adn = obtenerAdnPlayer();
                if (typeof generarSvgGeno === 'function') {
                    let svgString = generarSvgGeno(adn).replace(/<svg[^>]*>/, '<svg width="100%" height="100%" viewBox="-20 0 200 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">');
                    document.getElementById("geno-display").style.color = selColor.value; 
                    document.getElementById("geno-display").innerHTML = svgString;
                }
                actualizarTerminal();
            }

            [selRareza, selForma, selColor, selOjos, selBoca, selEspalda, selCabeza, selGenA, selGenB, selGenC, chkEscaneado].forEach(c => c.addEventListener("change", renderizarGenoPlayer));
            if (selColor) selColor.addEventListener("input", renderizarGenoPlayer);
            renderizarGenoPlayer();

            // ==========================================
            // MOTOR DE COMBATE INTERACTIVO (Mejorado con Generación Procedural)
            // ==========================================
            const btnGenerarRival = document.getElementById("btn-generar-combate");
            const btnAtacar = document.getElementById("btn-atacar");
            const logCombate = document.getElementById("combat-log-content");
            const logContainer = document.getElementById("combat-log");

            let playerCombat = null; let enemyCombat = null; let numeroTurno = 1;

            function scrollToBottom() { logContainer.scrollTop = logContainer.scrollHeight; }
            function addLog(text) { logCombate.innerHTML += `<div>${text}</div>`; scrollToBottom(); }

            function actualizarUICombate(p, esJugador) {
                const prefix = esJugador ? "c-p" : "c-e";
                document.getElementById(`${prefix}-atk`).innerText = `⚔️ ${p.atk}`;
                document.getElementById(`${prefix}-spd`).innerText = `⚡ ${p.spd}`;
                document.getElementById(`${prefix}-luk`).innerText = `🍀 ${p.luk}`;
                
                const hpPct = Math.max(0, (p.hp / p.maxHp) * 100);
                const fillBar = document.getElementById(`${prefix}-hp-fill`);
                fillBar.style.width = `${hpPct}%`;
                
                if (hpPct > 50) fillBar.style.background = "#4CAF50";
                else if (hpPct > 20) fillBar.style.background = "#ffeb3b";
                else fillBar.style.background = "#f44336";

                document.getElementById(`${prefix}-hp-text`).innerText = `HP: ${p.hp} / ${p.maxHp}`;
                if (p.hp <= 0) document.getElementById(esJugador ? "side-player" : "side-enemy").style.filter = "grayscale(1) brightness(0.5)";
            }

            function flashDamage(esJugador) {
                const el = document.getElementById(esJugador ? "combat-player-svg" : "combat-enemy-svg");
                el.classList.add("hit"); setTimeout(() => el.classList.remove("hit"), 150);
            }

            btnGenerarRival.onclick = () => {
                logCombate.innerHTML = "";
                addLog(`<span style="color:#4dd0e1">> INICIALIZANDO ARENA HOLOGRÁFICA...</span>`);
                
                document.getElementById("side-player").style.filter = "none";
                document.getElementById("side-enemy").style.filter = "none";
                numeroTurno = 1;

                const pAdn = obtenerAdnPlayer();
                playerCombat = {
                    nombre: "Tu Geno", isPlayer: true,
                    maxHp: pAdn.stats.hp, hp: pAdn.stats.hp, atk: pAdn.stats.atk, spd: pAdn.stats.spd, luk: pAdn.stats.luk,
                    genesId: [pAdn.hidden_genes.B?.id, pAdn.hidden_genes.C?.id],
                    crystalSkin: pAdn.hidden_genes.B?.id === "piel_cristal" || pAdn.hidden_genes.C?.id === "piel_cristal",
                    resilienciaUsada: false
                };

                // GENERACIÓN TOTALMENTE PROCEDURAL DEL RIVAL
                const enemyRareza = document.getElementById("sel-enemy-rareza").value;
                const enemyStats = window.generarStatsPorRareza ? window.generarStatsPorRareza(enemyRareza) : {hp: 80, atk: 20, spd: 20, luk: 15};
                
                const eForma = formasCuerpo[Math.floor(Math.random() * formasCuerpo.length)];
                const coloresRival = ["#ff6b6b", "#4dd0e1", "#fdfd96", "#b19cd9", "#77DD77", "#ff9800", "#ffb347", "#a8e6cf"];
                const eColor = coloresRival[Math.floor(Math.random() * coloresRival.length)];
                
                let eHiddenGenes = {A: null, B: null, C: null};
                if (typeof window.generarGenesV9 === 'function') {
                    eHiddenGenes = window.generarGenesV9(enemyRareza);
                } else {
                    let gB = genesFuncionales[Math.floor(Math.random() * genesFuncionales.length)];
                    let gC = genesFuncionales[Math.floor(Math.random() * genesFuncionales.length)];
                    while(gB.id === gC.id) gC = genesFuncionales[Math.floor(Math.random() * genesFuncionales.length)];
                    eHiddenGenes = {A: null, B: gB, C: gC};
                }

                const eAdn = { 
                    id: 888, scanned: true, rarity: enemyRareza, stats: enemyStats,
                    body_shape: eForma, base_color: eColor, color: eColor,
                    eye_type: opcionesOjos[Math.floor(Math.random() * opcionesOjos.length)], 
                    mouth_type: opcionesBocas[Math.floor(Math.random() * opcionesBocas.length)], 
                    wing_type: opcionesEspaldas[Math.floor(Math.random() * opcionesEspaldas.length)], 
                    hat_type: opcionesCabezas[Math.floor(Math.random() * opcionesCabezas.length)],
                    hidden_genes: eHiddenGenes 
                };

                const eGenB_id = eHiddenGenes.B ? eHiddenGenes.B.id : "ninguno";
                const eGenC_id = eHiddenGenes.C ? eHiddenGenes.C.id : "ninguno";

                enemyCombat = {
                    nombre: "Rival Salvaje", isPlayer: false,
                    maxHp: eAdn.stats.hp, hp: eAdn.stats.hp, atk: eAdn.stats.atk, spd: eAdn.stats.spd, luk: eAdn.stats.luk,
                    genesId: [eGenB_id, eGenC_id],
                    crystalSkin: eGenB_id === "piel_cristal" || eGenC_id === "piel_cristal",
                    resilienciaUsada: false
                };

                document.getElementById("combat-player-svg").innerHTML = typeof generarSvgGeno === 'function' ? generarSvgGeno(pAdn).replace(/<svg[^>]*>/, '<svg width="100%" height="100%" viewBox="-20 0 200 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">') : '';
                document.getElementById("combat-player-svg").style.color = pAdn.color;
                document.getElementById("combat-enemy-svg").innerHTML = typeof generarSvgGeno === 'function' ? generarSvgGeno(eAdn).replace(/<svg[^>]*>/, '<svg width="100%" height="100%" viewBox="-20 0 200 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">') : '';
                document.getElementById("combat-enemy-svg").style.color = eAdn.color;

                document.getElementById("c-p-rareza").innerText = pAdn.rarity;
                document.getElementById("c-e-rareza").innerText = eAdn.rarity;

                let calP = obtenerCalidad(pAdn.stats, pAdn.rarity);
                document.getElementById("c-p-calidad").innerText = `[${calP.rango} ${calP.pct}%]`;
                document.getElementById("c-p-calidad").style.color = calP.color;
                document.getElementById("c-p-calidad").style.textShadow = calP.rango === "S" ? "0 0 10px rgba(255,204,0,0.8)" : "none";

                let calE = obtenerCalidad(eAdn.stats, eAdn.rarity);
                document.getElementById("c-e-calidad").innerText = `[${calE.rango} ${calE.pct}%]`;
                document.getElementById("c-e-calidad").style.color = calE.color;
                document.getElementById("c-e-calidad").style.textShadow = calE.rango === "S" ? "0 0 10px rgba(255,204,0,0.8)" : "none";

                document.getElementById("c-p-genb").innerText = pAdn.hidden_genes.B ? pAdn.hidden_genes.B.name : "Vacío";
                document.getElementById("c-p-genc").innerText = pAdn.hidden_genes.C ? pAdn.hidden_genes.C.name : "Vacío";
                document.getElementById("c-e-genb").innerText = eHiddenGenes.B ? eHiddenGenes.B.name : "Vacío";
                document.getElementById("c-e-genc").innerText = eHiddenGenes.C ? eHiddenGenes.C.name : "Vacío";

                const comboP = detectarComboSinergico(playerCombat.genesId[0], playerCombat.genesId[1]);
                document.getElementById("c-p-combo").style.display = comboP ? "block" : "none";
                if(comboP) document.getElementById("c-p-combo").innerText = `🔥 COMBO: ${comboP}`;

                const comboE = detectarComboSinergico(enemyCombat.genesId[0], enemyCombat.genesId[1]);
                document.getElementById("c-e-combo").style.display = comboE ? "block" : "none";
                if(comboE) document.getElementById("c-e-combo").innerText = `🔥 COMBO: ${comboE}`;

                actualizarUICombate(playerCombat, true);
                actualizarUICombate(enemyCombat, false);

                btnAtacar.disabled = false;
                addLog(`> <span style="color:#ffcc00">Sinergia Rival:</span> ${comboE ? `¡Peligro! Combo ${comboE} activado.` : `Ningún combo detectado.`}`);
                addLog(`<br><span style="color:#8A2BE2; font-weight:bold;">--- LISTOS PARA COMBATE ---</span>`);
            };

            function procesarAtaque(atacante, defensor) {
                if (atacante.hp <= 0 || defensor.hp <= 0) return;

                let ataques = 1;
                if (atacante.genesId.includes("velocidad_fantasma") && Math.random() <= 0.20) {
                    ataques = 2;
                    addLog(`<span style="color:#b19cd9">* [Velocidad Fantasma] ¡${atacante.nombre} ataca rápido dos veces!</span>`);
                }

                for(let i=0; i<ataques; i++) {
                    if (defensor.hp <= 0) break;

                    let dmg = Math.floor(atacante.atk * (i === 1 ? 0.5 : 1) * (0.85 + Math.random() * 0.3));

                    if (defensor.crystalSkin) {
                        dmg = 0;
                        defensor.crystalSkin = false;
                        addLog(`<span style="color:#80deea">* [Piel de Cristal] ${defensor.nombre} absorbió el impacto (Daño: 0).</span>`);
                    } else {
                        defensor.hp -= dmg;
                        if(defensor.hp < 0) defensor.hp = 0;
                        addLog(`> ${atacante.nombre} ataca causando <span style="color:#ff6b6b">${dmg} de daño</span>.`);
                        flashDamage(defensor.isPlayer);
                    }

                    if (defensor.hp > 0 && defensor.hp <= (defensor.maxHp * 0.15) && defensor.genesId.includes("resiliencia_ultima") && !defensor.resilienciaUsada) {
                        defensor.resilienciaUsada = true;
                        defensor.atk = Math.floor(defensor.atk * 1.4);
                        defensor.spd = Math.floor(defensor.spd * 1.4);
                        addLog(`<span style="color:#ffcc00">* [Resiliencia Última] ¡${defensor.nombre} entra en modo Berserker! (ATK y SPD x1.4)</span>`);
                    }
                }
                actualizarUICombate(defensor, defensor.isPlayer);
            }

            btnAtacar.onclick = () => {
                addLog(`<br><span style="color:#4dd0e1">[TURNO ${numeroTurno}]</span>`);
                
                let primero = playerCombat; let segundo = enemyCombat;
                if (enemyCombat.spd > playerCombat.spd) { primero = enemyCombat; segundo = playerCombat; } 
                else if (enemyCombat.spd === playerCombat.spd && Math.random() > 0.5) { primero = enemyCombat; segundo = playerCombat; }

                procesarAtaque(primero, segundo);
                
                if (segundo.hp > 0) {
                    setTimeout(() => {
                        procesarAtaque(segundo, primero);
                        checkEndGame();
                    }, 500);
                } else { checkEndGame(); }
                
                numeroTurno++;
            };

            function checkEndGame() {
                if (playerCombat.hp <= 0 || enemyCombat.hp <= 0) {
                    btnAtacar.disabled = true;
                    addLog(`<br><span style="color:#ffcc00; font-size: 16px; font-weight: bold;">--- FIN DEL COMBATE ---</span>`);
                    if (playerCombat.hp > 0) addLog(`<span style="color:#4CAF50">🏆 ¡TU GENO HA GANADO!</span>`);
                    else if (enemyCombat.hp > 0) addLog(`<span style="color:#f44336">💀 TU GENO HA SIDO DERROTADO.</span>`);
                    else addLog(`<span style="color:#aaa">🤝 DOBLE K.O. EMPATE.</span>`);
                }
            }

        }, 500); 
    </script>
</body>
</html>
