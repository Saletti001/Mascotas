<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Laboratorio de Pruebas Genos V9.1</title>
    
    <script src="genoma.js"></script>
    <script src="caras.js"></script> 
    <script src="accesorios.js"></script> 
    <script src="SVGEngine.js"></script>
    <script src="app.js"></script>

    <style>
        body {
            background-color: #0a1118;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #4dd0e1; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(77, 208, 225, 0.5); margin-bottom: 5px; }
        .lab-container { display: flex; gap: 30px; background: #1a2a36; padding: 25px; border-radius: 15px; border: 1px solid #4dd0e1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 1200px; width: 100%; align-items: stretch;}
        
        .controls { flex: 1; display: flex; flex-direction: column; gap: 15px; max-height: 700px; overflow-y: auto; padding-right: 15px; }
        .controls::-webkit-scrollbar { width: 6px; }
        .controls::-webkit-scrollbar-thumb { background: #4dd0e1; border-radius: 4px; }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; border-left: 3px solid #4dd0e1; }
        .control-group.special-a { border-left: 3px solid #ffcc00; background: rgba(255, 204, 0, 0.05); }
        .control-group.special-b { border-left: 3px solid #80deea; background: rgba(128, 222, 234, 0.05); }
        .control-group.special-c { border-left: 3px solid #8A2BE2; background: rgba(138, 43, 226, 0.05); }
        label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        select, input[type="color"] { padding: 10px; background: #0d1a24; color: #fff; border: 1px solid #333; border-radius: 8px; font-size: 14px; outline: none; cursor: pointer; width: 100%; box-sizing: border-box; }
        select:focus, input:focus { border-color: #4dd0e1; }
        
        .viewer-container {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* VISOR VISUAL */
        .viewer { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background-color: #31c4d8;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px);
            border-radius: 10px; 
            border: 2px solid #4dd0e1; 
            min-height: 400px; 
            position: relative; 
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
        }

        .pedestal-container { position: absolute; top: 65%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; z-index: 0; }
        .pedestal-ring { width: 220px; height: 50px; border: 1px dashed rgba(255, 255, 255, 0.7); border-radius: 50%; position: absolute; top: -120px; }
        .pedestal-light { width: 130px; height: 140px; background: linear-gradient(to top, rgba(255, 255, 255, 0.5), transparent); position: absolute; top: -100px; }
        .pedestal-shadow { width: 170px; height: 45px; background: #111b24; border-radius: 50%; box-shadow: 0 10px 20px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; position: absolute; top: 25px; }
        .pedestal-core { width: 50px; height: 4px; background: #80deea; border-radius: 4px; box-shadow: 0 0 10px #80deea, 0 0 20px #80deea; }
        
        #geno-display { width: 300px; height: 300px; display: flex; justify-content: center; align-items: center; z-index: 1; position: relative; margin-bottom: 60px; }

        /* CONSOLA DE DIAGNÓSTICO (NUEVO) */
        .terminal {
            background: #0d161c;
            border: 1px solid #1e3a5f;
            border-left: 4px solid #00ffcc;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #00ffcc;
            height: 250px;
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            line-height: 1.6;
        }
        .terminal::-webkit-scrollbar { width: 4px; }
        .terminal::-webkit-scrollbar-thumb { background: #00ffcc; }
        .term-title { color: #fff; font-weight: bold; margin-bottom: 10px; text-align: center; border-bottom: 1px dashed #1e3a5f; padding-bottom: 5px; }
        .log-section { margin-top: 10px; }
        .log-highlight { color: #ffcc00; font-weight: bold; }
        .log-stats { color: #ff6b6b; }

        .switch-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 8px; border: 1px solid #333; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ffcc00; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <h1>🔬 Laboratorio Genético V9.1</h1>
    <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">Entorno de prueba visual y matemático para el ADN Funcional y Cosmético.</p>

    <div class="lab-container">
        <div class="controls">
            
            <div class="switch-container">
                <span style="font-size: 12px; color: #fff; font-weight: bold;">ADN Escaneado (Revelar Genes)</span>
                <label class="switch">
                    <input type="checkbox" id="chk-escaneado" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-group">
                <label style="color:#ff6b6b">Rareza (Afecta Stats Base)</label>
                <select id="sel-rareza">
                    <option value="Común">Común</option>
                    <option value="Raro">Raro</option>
                    <option value="Épico">Épico</option>
                    <option value="Legendario">Legendario</option>
                    <option value="Mítico">Mítico</option>
                </select>
            </div>

            <div class="control-group">
                <label>Forma Base (Cuerpo)</label>
                <select id="sel-forma"></select>
            </div>
            
            <div class="control-group">
                <label>Color Base</label>
                <input type="color" id="sel-color" value="#ff6b6b">
            </div>

            <div class="control-group">
                <label>Ojos</label>
                <select id="sel-ojos"></select>
            </div>

            <div class="control-group">
                <label>Boca</label>
                <select id="sel-boca"></select>
            </div>

            <div class="control-group">
                <label>Espalda / Alas</label>
                <select id="sel-espalda"></select>
            </div>
            
            <div class="control-group">
                <label>Accesorio / Cabeza</label>
                <select id="sel-cabeza"></select>
            </div>

            <div class="control-group special-a">
                <label style="color:#ffcc00">✨ Gen A (Cosmético)</label>
                <select id="sel-gen-a">
                    <option value="ninguno">Ninguno (Vacío)</option>
                    <option value="cromatico_latente">Cromático Latente (Épico)</option>
                    <option value="aura_linaje">Aura de Linaje (Legendario)</option>
                    <option value="patron_holografico">Patrón Holográfico (Mítico)</option>
                    <option value="brillo_bioluminiscente">Brillo Bioluminiscente (Raro)</option>
                    <option value="forma_invertida">Forma Invertida (Épico)</option>
                    <option value="rastro_elemental">Rastro Elemental (Raro)</option>
                    <option value="sombra_genetica">Sombra Genética (Épico)</option>
                    <option value="emblema_fundador">Emblema Fundador (Legendario)</option>
                    <option value="eco_visual">Eco Visual (Raro)</option>
                    <option value="metamorfosis_estacional">Metamorfosis Estacional (Épico)</option>
                </select>
            </div>

            <div class="control-group special-b">
                <label style="color:#80deea">⚙️ Gen B (Funcional 1)</label>
                <select id="sel-gen-b"><option value="ninguno">Ninguno (Vacío)</option></select>
            </div>

            <div class="control-group special-c">
                <label style="color:#8A2BE2">⚙️ Gen C (Funcional 2)</label>
                <select id="sel-gen-c"><option value="ninguno">Ninguno (Vacío)</option></select>
            </div>
            
        </div>

        <div class="viewer-container">
            <div class="viewer">
                <div class="pedestal-container">
                    <div class="pedestal-ring"></div>
                    <div class="pedestal-light"></div>
                    <div class="pedestal-shadow"><div class="pedestal-core"></div></div>
                </div>
                <div id="geno-display"></div>
            </div>
            
            <div id="terminal-output" class="terminal">
                <div class="term-title">/// TERMINAL DE DIAGNÓSTICO BIOMÉTRICO ///</div>
                <div id="terminal-content">Iniciando escáner...</div>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const selRareza = document.getElementById("sel-rareza");
            const selForma = document.getElementById("sel-forma");
            const selColor = document.getElementById("sel-color");
            const selOjos = document.getElementById("sel-ojos");
            const selBoca = document.getElementById("sel-boca");
            const selEspalda = document.getElementById("sel-espalda");
            const selCabeza = document.getElementById("sel-cabeza");
            
            const selGenA = document.getElementById("sel-gen-a");
            const selGenB = document.getElementById("sel-gen-b");
            const selGenC = document.getElementById("sel-gen-c");
            const chkEscaneado = document.getElementById("chk-escaneado");
            
            const display = document.getElementById("geno-display");
            const terminal = document.getElementById("terminal-content");

            const formasCuerpo = ["gota", "frijol", "circulo", "cuadrado", "triangulo", "hongo", "estrella", "pentagono", "nube", "chili", "rayo"];
            const opcionesOjos = typeof dicOjos !== 'undefined' ? Object.keys(dicOjos) : ["estandar", "cute", "angry"];
            const opcionesBocas = typeof dicBocas !== 'undefined' ? Object.keys(dicBocas) : ["estandar", "feliz", "colmillos"];
            const opcionesEspaldas = typeof dicAlas !== 'undefined' ? Object.keys(dicAlas) : ["ninguno"];
            const opcionesCabezas = typeof dicSombreros !== 'undefined' ? Object.keys(dicSombreros) : ["ninguno"];

            function rellenarSelect(selectElement, arrayData) {
                selectElement.innerHTML = "";
                arrayData.forEach(item => {
                    const option = document.createElement("option");
                    option.value = item;
                    option.innerText = item.charAt(0).toUpperCase() + item.slice(1).replace(/_/g, " ");
                    selectElement.appendChild(option);
                });
            }

            rellenarSelect(selForma, formasCuerpo);
            rellenarSelect(selOjos, opcionesOjos);
            rellenarSelect(selBoca, opcionesBocas);
            rellenarSelect(selEspalda, opcionesEspaldas);
            rellenarSelect(selCabeza, opcionesCabezas);
            selForma.value = formasCuerpo[Math.floor(Math.random() * formasCuerpo.length)];

            let genesFuncionales = [];
            if (window.BASE_DATOS_GENES_V9) {
                for (let cat in window.BASE_DATOS_GENES_V9) {
                    if (cat !== "cosmetico") window.BASE_DATOS_GENES_V9[cat].forEach(g => { genesFuncionales.push(g); });
                }
            }

            const addGenesToSelect = (selectElement) => {
                selectElement.innerHTML = '<option value="ninguno">Ninguno (Vacío)</option>';
                genesFuncionales.forEach(g => {
                    let opt = document.createElement("option"); opt.value = g.id; opt.innerText = g.name; selectElement.appendChild(opt);
                });
            };
            addGenesToSelect(selGenB); addGenesToSelect(selGenC);

            function diagnosticarGenes(stats, genB, genC) {
                let log = `<div class="log-section">> GENERANDO REPORTE DE SISTEMA...</div>`;
                log += `<div>> RAREZA DEL SUJETO: <span class="log-highlight">${selRareza.value.toUpperCase()}</span></div>`;
                log += `<div>> IVs BASE (Generados por app.js):</div>`;
                log += `<div class="log-stats">&nbsp;&nbsp;❤️ HP: ${stats.hp} | ⚔️ ATK: ${stats.atk} | ⚡ SPD: ${stats.spd} | 🍀 LUK: ${stats.luk}</div>`;

                if(!chkEscaneado.checked) {
                    log += `<br><div style="color:#ff6b6b">> ERROR: ADN BLOQUEADO. Active el escáner para ver la lógica de los genes.</div>`;
                    return log;
                }

                const evaluarGen = (g) => {
                    if(!g) return;
                    log += `<br><div style="color:#00a8ff">>>> ANALIZANDO GEN: [${g.name.toUpperCase()}] <<<</div>`;
                    
                    switch(g.id) {
                        case "aprendiz_acelerado":
                            log += `&nbsp;&nbsp;[PROGRESIÓN] La función getMultiplicadorXP() devolverá 1.25 en lugar de 1.0.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: Al comer una manzana, ganará 31 XP en lugar de 25 XP.`;
                            break;
                        case "fertilidad_pura":
                            log += `&nbsp;&nbsp;[CRIANZA] La función getMaxCrias() alterada.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: El límite máximo de reproducciones será 9 (Base: 7).`;
                            break;
                        case "esencia_concentrada":
                            log += `&nbsp;&nbsp;[SANTUARIO] La función getMultiplicadorEsencia() devolverá 2.0.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: Al liberarlo, entregará el doble de Esencia Vital (✨).`;
                            break;
                        case "umbral_despertar":
                            log += `&nbsp;&nbsp;[PROGRESIÓN] Función verificarUmbralDespertar() en escucha.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: Al llegar a Nivel 25, inyectará +5 permanente a todos los IVs.<br>`;
                            log += `&nbsp;&nbsp;* Stats Proyectadas Nv.25: ❤️${stats.hp+5} | ⚔️${stats.atk+5} | ⚡${stats.spd+5} | 🍀${stats.luk+5}`;
                            break;
                        case "piel_cristal":
                            log += `&nbsp;&nbsp;[COMBATE] Flag de daño inicial anulado.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: En Coliseo, el primer ataque enemigo aplicará 0 de daño.`;
                            break;
                        case "resiliencia_ultima":
                            let umbralHP = Math.floor(stats.hp * 0.15);
                            let buffATK = Math.floor(stats.atk * 1.4);
                            let buffSPD = Math.floor(stats.spd * 1.4);
                            log += `&nbsp;&nbsp;[COMBATE] Evento condicional de vida detectado.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: Si en batalla el HP cae a ${umbralHP} o menos (15%), el ataque subirá a ${buffATK} y la velocidad a ${buffSPD}.`;
                            break;
                        case "dominancia_genetica":
                            log += `&nbsp;&nbsp;[CRIANZA] Motor de herencia genética sobrecargado.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: Al incubar, tiene 70% de probabilidad de imponer sus genes a la cría (Base: 30%).`;
                            break;
                        case "cooldown_acelerado":
                            log += `&nbsp;&nbsp;[CRIANZA] Temporizador de descanso alterado.<br>`;
                            log += `&nbsp;&nbsp;* Simulación: El tiempo de espera tras criar se reduce a la mitad.`;
                            break;
                        default:
                            log += `&nbsp;&nbsp;[PASIVA] Efecto: "${g.desc}" listo para ejecución en el módulo correspondiente.`;
                    }
                };

                if (selGenA.value !== "ninguno") {
                    log += `<br><div style="color:#ffcc00">>>> ANALIZANDO GEN: [COSMÉTICO] <<<</div>`;
                    log += `&nbsp;&nbsp;[VISUAL] Renderizando efecto visual. Sin impacto en Stats matemáticas.`;
                }

                evaluarGen(genB); evaluarGen(genC);
                
                if(genB && genC && genB.id === genC.id) {
                    log += `<br><div style="color:#ff6b6b; font-weight:bold;">> ADVERTENCIA: Conflicto genético. El motor 'app.js' anulará el Slot C (Regla B!=C) durante la cría.</div>`;
                }

                return log;
            }

            function renderizarGeno() {
                const rarezaElegida = selRareza.value;
                const baseStats = window.generarStatsPorRareza ? window.generarStatsPorRareza(rarezaElegida) : {hp: 50, atk: 15, spd: 15, luk: 15};

                const genBData = selGenB.value !== "ninguno" ? genesFuncionales.find(g => g.id === selGenB.value) : null;
                const genCData = selGenC.value !== "ninguno" ? genesFuncionales.find(g => g.id === selGenC.value) : null;

                const adnFalso = {
                    id: Math.floor(Math.random() * 1000), 
                    rarity: rarezaElegida,
                    stats: baseStats,
                    body_shape: selForma.value, base_color: selColor.value, color: selColor.value,
                    eye_type: selOjos.value, mouth_type: selBoca.value, wing_type: selEspalda.value, hat_type: selCabeza.value,
                    scanned: chkEscaneado.checked,
                    hidden_genes: {
                        A: selGenA.value !== "ninguno" ? { id: selGenA.value, name: selGenA.options[selGenA.selectedIndex].text } : null,
                        B: genBData, C: genCData
                    }
                };

                if (typeof generarSvgGeno === 'function') {
                    let svgString = generarSvgGeno(adnFalso);
                    svgString = svgString.replace(/<svg[^>]*>/, '<svg width="100%" height="100%" viewBox="-20 0 200 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">');
                    display.style.color = selColor.value; 
                    display.innerHTML = svgString;

                    // Actualizar Terminal de Diagnóstico
                    terminal.innerHTML = diagnosticarGenes(baseStats, genBData, genCData);
                }
            }

            [selRareza, selForma, selColor, selOjos, selBoca, selEspalda, selCabeza, selGenA, selGenB, selGenC, chkEscaneado].forEach(control => {
                control.addEventListener("change", renderizarGeno);
            });
            if (selColor) selColor.addEventListener("input", renderizarGeno);

            renderizarGeno();
        }, 500); 
    </script>
</body>
</html>
