<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Laboratorio de Pruebas Genos V9</title>
    
    <script src="genoma.js"></script>
    <script src="caras.js"></script> 
    <script src="accesorios.js"></script> 
    <script src="SVGEngine.js"></script>
    <script src="app.js"></script>

    <style>
        body {
            background-color: #0a1118;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4dd0e1;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(77, 208, 225, 0.5);
            margin-bottom: 5px;
        }
        .lab-container {
            display: flex;
            gap: 40px;
            background: #1a2a36;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #4dd0e1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 100%;
        }
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 15px;
        }
        .controls::-webkit-scrollbar { width: 6px; }
        .controls::-webkit-scrollbar-thumb { background: #4dd0e1; border-radius: 4px; }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #4dd0e1;
        }
        .control-group.special {
            border-left: 3px solid #ffcc00;
            background: rgba(255, 204, 0, 0.05);
        }
        
        label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .special label { color: #ffcc00; }
        
        select, input[type="color"] {
            padding: 10px;
            background: #0d1a24;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
        select:focus, input:focus { border-color: #4dd0e1; }
        
        .viewer {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d1a24; 
            border-radius: 10px;
            border: 2px dashed #1e88e5; 
            padding: 20px;
            min-height: 400px;
            position: relative;
        }
        #geno-display {
            width: 300px; 
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Toggle Switch para el Escáner */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .switch {
            position: relative; display: inline-block; width: 40px; height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ffcc00; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <h1>🔬 Laboratorio Genético V9.0</h1>
    <p style="color: #aaa; margin-bottom: 30px; font-size: 14px;">Entorno de prueba para motor morfológico y efectos visuales de ADN oculto.</p>

    <div class="lab-container">
        <div class="controls">
            <div class="control-group">
                <label>Forma Base (Cuerpo)</label>
                <select id="sel-forma"></select>
            </div>
            
            <div class="control-group">
                <label>Color Base</label>
                <input type="color" id="sel-color" value="#77DD77">
            </div>

            <div class="control-group">
                <label>Ojos</label>
                <select id="sel-ojos"></select>
            </div>

            <div class="control-group">
                <label>Boca</label>
                <select id="sel-boca"></select>
            </div>

            <div class="control-group">
                <label>Espalda / Alas</label>
                <select id="sel-espalda"></select>
            </div>
            
            <div class="control-group">
                <label>Accesorio / Cabeza</label>
                <select id="sel-cabeza"></select>
            </div>

            <div class="control-group special">
                <label>🧬 Slot A (Gen Cosmético)</label>
                <select id="sel-gen-a">
                    <option value="ninguno">Ninguno (Vacío)</option>
                    <option value="aura_linaje">Aura de Linaje (Legendario)</option>
                    <option value="patron_holografico">Patrón Holográfico (Mítico)</option>
                </select>
                
                <div class="switch-container" style="margin-top: 10px;">
                    <label class="switch">
                        <input type="checkbox" id="chk-escaneado" checked>
                        <span class="slider"></span>
                    </label>
                    <span style="font-size: 12px; color: #fff; font-weight: bold;">ADN Escaneado (Revelado)</span>
                </div>
            </div>
        </div>

        <div class="viewer">
            <div id="geno-display"></div>
            <p id="code-output" style="margin-top:20px; font-size:13px; color:#1e88e5; font-weight: bold; text-align:center;">Cargando motor...</p>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const selForma = document.getElementById("sel-forma");
            const selColor = document.getElementById("sel-color");
            const selOjos = document.getElementById("sel-ojos");
            const selBoca = document.getElementById("sel-boca");
            const selEspalda = document.getElementById("sel-espalda");
            const selCabeza = document.getElementById("sel-cabeza");
            const selGenA = document.getElementById("sel-gen-a");
            const chkEscaneado = document.getElementById("chk-escaneado");
            
            const display = document.getElementById("geno-display");
            const codeOutput = document.getElementById("code-output");

            // Formas base
            const formasCuerpo = ["gota", "frijol", "circulo", "cuadrado", "triangulo", "hongo", "estrella", "pentagono", "nube", "chili", "rayo"];

            // Arrays dinámicos de los archivos JS
            const opcionesOjos = typeof dicOjos !== 'undefined' ? Object.keys(dicOjos) : ["estandar", "cute", "angry"];
            const opcionesBocas = typeof dicBocas !== 'undefined' ? Object.keys(dicBocas) : ["estandar", "feliz", "colmillos"];
            const opcionesEspaldas = typeof dicAlas !== 'undefined' ? Object.keys(dicAlas) : ["ninguno"];
            const opcionesCabezas = typeof dicSombreros !== 'undefined' ? Object.keys(dicSombreros) : ["ninguno"];

            function rellenarSelect(selectElement, arrayData) {
                selectElement.innerHTML = "";
                arrayData.forEach(item => {
                    const option = document.createElement("option");
                    option.value = item;
                    option.innerText = item.charAt(0).toUpperCase() + item.slice(1).replace(/_/g, " ");
                    selectElement.appendChild(option);
                });
            }

            rellenarSelect(selForma, formasCuerpo);
            rellenarSelect(selOjos, opcionesOjos);
            rellenarSelect(selBoca, opcionesBocas);
            rellenarSelect(selEspalda, opcionesEspaldas);
            rellenarSelect(selCabeza, opcionesCabezas);

            function renderizarGeno() {
                // Simulación del ADN de la V9.0
                const adnFalso = {
                    id: 999, // Para los degradados
                    body_shape: selForma.value,
                    base_color: selColor.value,
                    color: selColor.value,
                    eye_type: selOjos.value,
                    mouth_type: selBoca.value,
                    wing_type: selEspalda.value,
                    hat_type: selCabeza.value,
                    scanned: chkEscaneado.checked,
                    hidden_genes: {
                        A: selGenA.value !== "ninguno" ? { id: selGenA.value, name: selGenA.options[selGenA.selectedIndex].text } : null,
                        B: null,
                        C: null
                    }
                };

                if (typeof generarSvgGeno === 'function') {
                    let svgString = generarSvgGeno(adnFalso);
                    svgString = svgString.replace(/<svg[^>]*>/, '<svg width="100%" height="100%" viewBox="-20 0 200 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">');
                    
                    display.style.color = selColor.value; 
                    display.innerHTML = svgString;
                    
                    let statusGen = adnFalso.scanned ? "Revelado" : "Oculto";
                    codeOutput.innerText = `FORMA: ${selForma.value.toUpperCase()} | GEN COSMÉTICO: ${statusGen}`;
                } else {
                    display.innerHTML = "<p style='color:#ff6b6b; font-weight:bold; text-align:center;'>Error: No se encontró SVGEngine.js.</p>";
                }
            }

            // Listeners
            [selForma, selColor, selOjos, selBoca, selEspalda, selCabeza, selGenA, chkEscaneado].forEach(control => {
                control.addEventListener("change", renderizarGeno);
            });
            if (selColor) selColor.addEventListener("input", renderizarGeno);

            renderizarGeno();
        }, 500); 
    </script>
</body>
</html>
