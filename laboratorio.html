<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Laboratorio de Pruebas Genos</title>
    
    <script src="genoma.js"></script>
    <script src="caras.js"></script> 
    <script src="accesorios.js"></script> <script src="SVGEngine.js"></script>
    <script src="app.js"></script>

    <style>
        body {
            background-color: #0a1118;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4dd0e1;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(77, 208, 225, 0.5);
        }
        .lab-container {
            display: flex;
            gap: 40px;
            background: #1a2a36;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #4dd0e1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
        }
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
        }
        select, input[type="color"] {
            padding: 10px;
            background: #0d1a24;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        select:focus, input:focus {
            border-color: #4dd0e1;
        }
        .viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #90caf9; 
            border-radius: 10px;
            border: 2px dashed #1e88e5; 
            padding: 20px;
            min-height: 250px;
        }
        #geno-display {
            width: 250px; 
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <h1>🔬 Entorno de Pruebas Morfológicas</h1>
    <p style="color: #aaa; margin-bottom: 30px;">Ajusta los parámetros para probar cómo renderiza el SVGEngine.</p>

    <div class="lab-container">
        <div class="controls">
            <div class="control-group">
                <label>Forma Base (Cuerpo)</label>
                <select id="sel-forma"></select>
            </div>
            
            <div class="control-group">
                <label>Color Base</label>
                <input type="color" id="sel-color" value="#77DD77">
            </div>

            <div class="control-group">
                <label>Ojos</label>
                <select id="sel-ojos"></select>
            </div>

            <div class="control-group">
                <label>Boca</label>
                <select id="sel-boca"></select>
            </div>

            <div class="control-group">
                <label>Espalda / Alas</label>
                <select id="sel-espalda"></select>
            </div>
            
            <div class="control-group">
                <label>Accesorio / Cabeza</label>
                <select id="sel-cabeza"></select>
            </div>
        </div>

        <div class="viewer">
            <div id="geno-display">
                </div>
            <p id="code-output" style="margin-top:20px; font-size:13px; color:#1e88e5; font-weight: bold; text-align:center;">Cargando...</p>
        </div>
    </div>

    <script>
        // Usamos setTimeout para darle tiempo a que carguen tus otros archivos JS
        setTimeout(() => {
            const selForma = document.getElementById("sel-forma");
            const selColor = document.getElementById("sel-color");
            const selOjos = document.getElementById("sel-ojos");
            const selBoca = document.getElementById("sel-boca");
            const selEspalda = document.getElementById("sel-espalda");
            const selCabeza = document.getElementById("sel-cabeza");
            const display = document.getElementById("geno-display");
            const codeOutput = document.getElementById("code-output");

            // 1. Las formas principales de cuerpo
            const formasCuerpo = ["gota", "frijol", "circulo", "cuadrado", "triangulo", "hongo", "estrella", "pentagono", "nube", "chili", "rayo"];

            // 2. Ahora sí encontrará tus variables reales de caras.js y accesorios.js
            const opcionesOjos = typeof dicOjos !== 'undefined' ? Object.keys(dicOjos) : ["estandar", "cute", "angry"];
            const opcionesBocas = typeof dicBocas !== 'undefined' ? Object.keys(dicBocas) : ["estandar", "feliz", "colmillos"];
            const opcionesEspaldas = typeof dicAlas !== 'undefined' ? Object.keys(dicAlas) : ["ninguno"];
            const opcionesCabezas = typeof dicSombreros !== 'undefined' ? Object.keys(dicSombreros) : ["ninguno"];

            // 3. Llenar los menús desplegables
            function rellenarSelect(selectElement, arrayData) {
                selectElement.innerHTML = "";
                arrayData.forEach(item => {
                    const option = document.createElement("option");
                    option.value = item;
                    option.innerText = item.charAt(0).toUpperCase() + item.slice(1).replace(/_/g, " ");
                    selectElement.appendChild(option);
                });
            }

            rellenarSelect(selForma, formasCuerpo);
            rellenarSelect(selOjos, opcionesOjos);
            rellenarSelect(selBoca, opcionesBocas);
            rellenarSelect(selEspalda, opcionesEspaldas);
            rellenarSelect(selCabeza, opcionesCabezas);

            // 4. Función de Dibujo
            function renderizarGeno() {
                const adnFalso = {
                    body_shape: selForma.value,
                    base_color: selColor.value,
                    color: selColor.value,
                    eye_type: selOjos.value,
                    mouth_type: selBoca.value,
                    wing_type: selEspalda.value,
                    hat_type: selCabeza.value
                };

                if (typeof generarSvgGeno === 'function') {
                    let svgString = generarSvgGeno(adnFalso);
                    // Forzamos tamaño completo para la previsualización
                    svgString = svgString.replace(/<svg[^>]*>/, '<svg width="100%" height="100%" viewBox="-20 0 200 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">');
                    
                    display.style.color = selColor.value; 
                    display.innerHTML = svgString;
                    codeOutput.innerText = `FORMA: ${selForma.value.toUpperCase()}`;
                } else {
                    display.innerHTML = "<p style='color:#ff6b6b; font-weight:bold; text-align:center;'>Error: No se encontró el SVGEngine.</p>";
                }
            }

            // 5. Escuchamos cambios
            [selForma, selColor, selOjos, selBoca, selEspalda, selCabeza].forEach(control => {
                control.addEventListener("change", renderizarGeno);
            });

            // Dibujo inicial
            renderizarGeno();
        }, 500); 
    </script>
</body>
</html>
