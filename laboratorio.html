<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Laboratorio de Pruebas Genos</title>
    <script src="genoma.js"></script>
    <script src="SVGEngine.js"></script>
    <style>
        body {
            background-color: #0a1118;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4dd0e1;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(77, 208, 225, 0.5);
        }
        .lab-container {
            display: flex;
            gap: 40px;
            background: #1a2a36;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #4dd0e1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
        }
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
        }
        select, input[type="color"] {
            padding: 10px;
            background: #0d1a24;
            color: #fff;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        select:focus, input:focus {
            border-color: #4dd0e1;
        }
        .viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0d1a24;
            border-radius: 10px;
            border: 2px dashed #333;
            padding: 20px;
            min-height: 250px;
        }
        #geno-display {
            width: 250px; 
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <h1>🔬 Entorno de Pruebas Morfológicas</h1>
    <p style="color: #aaa; margin-bottom: 30px;">Ajusta los parámetros para probar cómo renderiza el SVGEngine. Este entorno está desconectado del juego principal.</p>

    <div class="lab-container">
        <div class="controls">
            <div class="control-group">
                <label>Forma Base (Cuerpo)</label>
                <select id="sel-forma"></select>
            </div>
            
            <div class="control-group">
                <label>Color Base</label>
                <input type="color" id="sel-color" value="#77DD77">
            </div>

            <div class="control-group">
                <label>Ojos</label>
                <select id="sel-ojos"></select>
            </div>

            <div class="control-group">
                <label>Boca</label>
                <select id="sel-boca"></select>
            </div>

            <div class="control-group">
                <label>Espalda / Alas</label>
                <select id="sel-espalda"></select>
            </div>
            
            <div class="control-group">
                <label>Accesorio / Cabeza</label>
                <select id="sel-cabeza"></select>
            </div>
        </div>

        <div class="viewer">
            <div id="geno-display">
                </div>
            <p id="code-output" style="margin-top:20px; font-size:13px; color:#4dd0e1; font-weight: bold; text-align:center;">Cargando...</p>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // Referencias a la UI
            const selForma = document.getElementById("sel-forma");
            const selColor = document.getElementById("sel-color");
            const selOjos = document.getElementById("sel-ojos");
            const selBoca = document.getElementById("sel-boca");
            const selEspalda = document.getElementById("sel-espalda");
            const selCabeza = document.getElementById("sel-cabeza");
            const display = document.getElementById("geno-display");
            const codeOutput = document.getElementById("code-output");

            // 1. Las formas de cuerpo (Están en tu switch de SVGEngine, así que las listamos a mano)
            const formasCuerpo = ["gota", "frijol", "circulo", "cuadrado", "triangulo", "hongo", "estrella", "pentagono", "nube", "chili", "rayo"];

            // 2. Extraemos los ojos, bocas, etc., leyendo directamente tus variables de genoma.js
            function obtenerOpciones(dic) {
                return (typeof dic !== 'undefined' && Object.keys(dic).length > 0) ? Object.keys(dic) : ["ninguno"];
            }

            const opcionesOjos = obtenerOpciones(typeof dicOjos !== 'undefined' ? dicOjos : undefined);
            const opcionesBocas = obtenerOpciones(typeof dicBocas !== 'undefined' ? dicBocas : undefined);
            const opcionesEspaldas = obtenerOpciones(typeof dicAlas !== 'undefined' ? dicAlas : undefined);
            const opcionesCabezas = obtenerOpciones(typeof dicSombreros !== 'undefined' ? dicSombreros : undefined);

            // 3. Llenar los menús desplegables
            function rellenarSelect(selectElement, arrayData) {
                selectElement.innerHTML = "";
                arrayData.forEach(item => {
                    const option = document.createElement("option");
                    option.value = item;
                    // Ponemos la primera letra en mayúscula para que se vea bonito
                    option.innerText = item.charAt(0).toUpperCase() + item.slice(1).replace(/_/g, " ");
                    selectElement.appendChild(option);
                });
            }

            rellenarSelect(selForma, formasCuerpo);
            rellenarSelect(selOjos, opcionesOjos);
            rellenarSelect(selBoca, opcionesBocas);
            rellenarSelect(selEspalda, opcionesEspaldas);
            rellenarSelect(selCabeza, opcionesCabezas);

            // 4. Función principal de Dibujo
            function renderizarGeno() {
                // Creamos un "ADN de prueba"
                const adnFalso = {
                    body_shape: selForma.value,
                    base_color: selColor.value,
                    color: selColor.value,
                    eye_type: selOjos.value,
                    mouth_type: selBoca.value,
                    wing_type: selEspalda.value,
                    hat_type: selCabeza.value
                };

                // Llamamos a tu motor SVGEngine.js
                if (typeof generarSvgGeno === 'function') {
                    let svgString = generarSvgGeno(adnFalso);
                    
                    // Forzamos el encuadre para que se vea bien en el laboratorio
                    svgString = svgString.replace(/<svg[^>]*>/, '<svg width="100%" height="100%" viewBox="-20 0 200 160" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">');
                    
                    display.style.color = selColor.value; 
                    display.innerHTML = svgString;

                    codeOutput.innerText = `FORMA: ${selForma.value.toUpperCase()}`;
                } else {
                    display.innerHTML = "<p style='color:#ff6b6b; font-weight:bold;'>Error: No se encontró la función generarSvgGeno. Verifica que SVGEngine.js está en la misma carpeta.</p>";
                }
            }

            // 5. Escuchamos los clics
            [selForma, selColor, selOjos, selBoca, selEspalda, selCabeza].forEach(control => {
                control.addEventListener("change", renderizarGeno);
            });

            // Darle medio segundo a la BBDD para cargar y hacer el primer dibujo
            setTimeout(renderizarGeno, 100);
        });
    </script>
</body>
</html>
