<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blandis Genéticos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="room-area">
            <h2 style="color: #ccc; position: absolute; top: 20px; left: 20px; margin: 0;">Tu Laboratorio</h2>
            
            <div id="inventory-ui">
                <div id="backpack-icon" title="Abrir Bolsillos Rotos">🎒</div>
                <div id="slot-counter">0/10<br>SLOTS</div>
            </div>

            <div id="inventory-modal" class="hidden">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Bolsillos Rotos</h3>
                        <button id="close-inventory">❌</button>
                    </div>
                    <div id="inventory-grid"></div>
                </div>
            </div>

            <div id="blandi-container"></div>
        </div>

        <div id="bottom-menu">
            <div class="menu-btn" title="Alimentar">🍎</div>
            <div class="menu-btn" title="Limpiar">🧼</div>
            <div class="menu-btn" title="Arcade">🕹️</div>
            <div class="menu-btn" title="Coliseo">⚔️</div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="InventoryManager.js"></script>
</body>
</html>
